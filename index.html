<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>suckhoetinhthan.com – Emotico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="logo-emotico-v1.png" alt="Emotico" width="116" height="31">
    </div>

    <div class="divider"></div>

    <div class="domain-pill">
      <span></span>
      suckhoetinhthan.com
    </div>

    <h1>Tên miền này là tài sản số<br>thuộc sở hữu của <strong style="color:var(--accent)">Emotico</strong></h1>
    <p class="desc">Bạn sẽ được chuyển hướng đến trang chính thức<br><strong>Công ty Cổ phần Emotico</strong>.</p>

    <div class="countdown-section">
      <div class="countdown-label">Chuyển hướng sau</div>
      <div class="countdown" id="count">8</div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <a class="cta-btn" href="https://emotico.wiki">
      Đến emotico.wiki ngay
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>

    <div class="footer">© Công ty Cổ phần Emotico · emotico.wiki</div>
  </div>

  <script>
    const TOTAL = 8;
    let n = TOTAL;
    const countEl = document.getElementById('count');
    const progressEl = document.getElementById('progress');

    const timer = setInterval(() => {
      n--;
      countEl.textContent = n;
      countEl.classList.add('tick');
      setTimeout(() => countEl.classList.remove('tick'), 150);
      progressEl.style.width = (n / TOTAL * 100) + '%';
      if (n <= 0) {
        clearInterval(timer);
        window.location.href = 'https://emotico.wiki';
      }
    }, 1000);
  </script>
</body>
</html>
